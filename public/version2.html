<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V2 | INFINITY PROTOCOLS</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Three.js Stack -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        
        .system-vitals {
            font-size: 12px;
            letter-spacing: 2px;
            color: #00f3ff;
            text-transform: uppercase;
            border-left: 2px solid #00f3ff;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .hud-label { opacity: 0.6; font-size: 10px; }
        .hud-value { font-size: 18px; font-weight: bold; }

        #nexus-logo {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f3ff;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader { width: 40px; height: 40px; border: 2px solid #00f3ff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; letter-spacing: 4px;">INITIALIZING NEXUS V2...</p>
    </div>

    <div id="ui-overlay">
        <div class="system-vitals">
            <div class="hud-label">Rendering Engine</div>
            <div class="hud-value">INFINITY-X V2.0</div>
        </div>
        <div class="system-vitals" style="border-color: #ff00ff;">
            <div class="hud-label">Visual Status</div>
            <div class="hud-value" style="color: #ff00ff;">HOLOGRAPHIC READY</div>
        </div>
    </div>

    <div id="nexus-logo">NEXUS <span style="font-weight: 300; opacity: 0.5;">RIWI</span></div>

    <div id="canvas-container"></div>

    <script type="module">
        import { V2App } from './js/v2/V2App.js';
        
        window.addEventListener('load', () => {
            const app = new V2App();
            app.init().then(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').remove();
                }, 1000);
            });
        });
    </script>
</body>
</html>
