<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V2 | INFINITY PROTOCOLS</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Three.js Stack -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        
        .system-vitals {
            font-size: 12px;
            letter-spacing: 2px;
            color: #00f3ff;
            text-transform: uppercase;
            border-left: 2px solid #00f3ff;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .hud-label { opacity: 0.6; font-size: 10px; }
        .hud-value { font-size: 18px; font-weight: bold; }

        #nexus-logo {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f3ff;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader { width: 40px; height: 40px; border: 2px solid #00f3ff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* ── RANKING PANEL ───────────────────────────────────────── */
        #ranking-panel {
            position: absolute;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            width: 240px;
            background: rgba(0, 2, 16, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.25);
            border-radius: 12px;
            padding: 18px 16px 14px;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 40px rgba(0,243,255,0.08), inset 0 0 40px rgba(0,0,0,0.5);
        }

        #ranking-panel .rp-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(0,243,255,0.55);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0,243,255,0.18);
            padding-bottom: 8px;
            margin-bottom: 14px;
            text-align: center;
        }

        #ranking-panel .rp-title span {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 2px;
        }

        .rp-clan {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 6px;
            border-radius: 7px;
            margin-bottom: 4px;
            transition: background .3s;
        }
        .rp-clan:last-child { margin-bottom: 0; }

        .rp-rank {
            font-size: 18px;
            font-weight: 900;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
            color: rgba(255,255,255,0.35);
        }
        .rp-rank.gold   { color: #F2C94C; text-shadow: 0 0 8px #F2C94C88; }
        .rp-rank.silver { color: #a0b0c0; text-shadow: 0 0 6px #a0b0c088; }
        .rp-rank.bronze { color: #cd7f32; text-shadow: 0 0 6px #cd7f3288; }

        .rp-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .rp-info { flex: 1; min-width: 0; }
        .rp-name {
            font-size: 13px; font-weight: 700;
            letter-spacing: 1.5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-transform: uppercase;
        }
        .rp-score {
            font-size: 10px; letter-spacing: 1px;
            opacity: 0.55; margin-top: 1px;
        }

        .rp-bar-wrap {
            width: 100%; height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .rp-bar {
            height: 100%; width: 0%;
            border-radius: 2px;
            transition: width 1s ease;
        }

        .rp-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 10px 0;
        }

        .rp-footer {
            font-size: 9px; letter-spacing: 2px;
            color: rgba(0,243,255,0.3);
            text-align: center;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; letter-spacing: 4px;">INITIALIZING NEXUS V2...</p>
    </div>

    <div id="ui-overlay">
        <div class="system-vitals">
            <div class="hud-label">Rendering Engine</div>
            <div class="hud-value">INFINITY-X V2.0</div>
        </div>
        <div class="system-vitals" style="border-color: #ff00ff;">
            <div class="hud-label">Visual Status</div>
            <div class="hud-value" style="color: #ff00ff;">HOLOGRAPHIC READY</div>
        </div>
    </div>

    <div id="nexus-logo">NEXUS <span style="font-weight: 300; opacity: 0.5;">RIWI</span></div>

    <!-- CLAN RANKING PANEL -->
    <div id="ranking-panel">
        <div class="rp-title">
            <span>⬡ NEXUS</span>
            CLAN RANKINGS
        </div>

        <!-- Rank 1 -->
        <div class="rp-clan">
            <div class="rp-rank gold">1</div>
            <div class="rp-dot" style="color:#00c3ff;background:#00c3ff"></div>
            <div class="rp-info">
                <div class="rp-name" style="color:#00c3ff">Turing</div>
                <div class="rp-score">0 pts</div>
                <div class="rp-bar-wrap"><div class="rp-bar" style="background:#00c3ff;width:0%"></div></div>
            </div>
        </div>
        <!-- Rank 2 -->
        <div class="rp-clan">
            <div class="rp-rank silver">2</div>
            <div class="rp-dot" style="color:#ff3344;background:#ff3344"></div>
            <div class="rp-info">
                <div class="rp-name" style="color:#ff3344">Tesla</div>
                <div class="rp-score">0 pts</div>
                <div class="rp-bar-wrap"><div class="rp-bar" style="background:#ff3344;width:0%"></div></div>
            </div>
        </div>
        <!-- Rank 3 -->
        <div class="rp-clan">
            <div class="rp-rank bronze">3</div>
            <div class="rp-dot" style="color:#00ff44;background:#00ff44"></div>
            <div class="rp-info">
                <div class="rp-name" style="color:#00ff44">McCarthy</div>
                <div class="rp-score">0 pts</div>
                <div class="rp-bar-wrap"><div class="rp-bar" style="background:#00ff44;width:0%"></div></div>
            </div>
        </div>
        <!-- Rank 4 -->
        <div class="rp-clan">
            <div class="rp-rank">4</div>
            <div class="rp-dot" style="color:#F2C94C;background:#F2C94C"></div>
            <div class="rp-info">
                <div class="rp-name" style="color:#F2C94C">Hamilton</div>
                <div class="rp-score">0 pts</div>
                <div class="rp-bar-wrap"><div class="rp-bar" style="background:#F2C94C;width:0%"></div></div>
            </div>
        </div>
        <!-- Rank 5 -->
        <div class="rp-clan">
            <div class="rp-rank">5</div>
            <div class="rp-dot" style="color:#9B51E0;background:#9B51E0"></div>
            <div class="rp-info">
                <div class="rp-name" style="color:#9B51E0">Thompson</div>
                <div class="rp-score">0 pts</div>
                <div class="rp-bar-wrap"><div class="rp-bar" style="background:#9B51E0;width:0%"></div></div>
            </div>
        </div>

        <hr class="rp-divider">
        <div class="rp-footer">Season · Week 1</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import { V2App } from './js/V2App.js';
        
        window.addEventListener('load', () => {
            const app = new V2App();
            app.init().then(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').remove();
                }, 1000);
            });
        });
    </script>
</body>
</html>
